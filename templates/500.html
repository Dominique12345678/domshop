{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur Serveur - DomShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #14599e;
            --secondary: #f76d34;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            margin: 0;
            color: var(--secondary);
            line-height: 1;
            text-shadow: 0 0 20px rgba(247, 109, 52, 0.4);
        }
        h1 {
            font-size: 28px;
            margin-top: 10px;
            color: #fff;
        }
        p {
            font-size: 16px;
            color: #a0a0c0;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 80px;
            color: white;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(45deg, var(--primary), #00d2ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-tools"></i></div>
        <div class="error-code">500</div>
        <h1>Maintenance imprévue</h1>
        <p>Nos serveurs ont un petit coup de fatigue. Nos techniciens sont déjà sur le coup pour réparer tout ça. Réessayez dans quelques instants !</p>
        <a href="/" class="btn"><i class="fas fa-sync me-2"></i> Recharger la boutique</a>
    </div>
</body>
</html>
