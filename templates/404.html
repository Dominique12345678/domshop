{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée - DomShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #14599e;
            --secondary: #f76d34;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #2d3436;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        h1 {
            font-size: 28px;
            margin-top: 10px;
            color: var(--primary);
        }
        p {
            font-size: 16px;
            color: #636e72;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 80px;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .btn {
            display: inline-block;
            padding: 15px 35px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(20, 89, 158, 0.2);
        }
        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(247, 109, 52, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-search-location"></i></div>
        <div class="error-code">404</div>
        <h1>Oups ! Page introuvable</h1>
        <p>Il semble que le produit ou la page que vous cherchez n'existe plus ou a été déplacé vers un nouvel univers.</p>
        <a href="/" class="btn"><i class="fas fa-home me-2"></i> Retour à la boutique</a>
    </div>
</body>
</html>
