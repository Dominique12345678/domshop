{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DomShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #14599e;
            --secondary-color: #f76d34;
            --light-color: #f8f9fa;
            --dark-color: #1a1a2e;
            --border-color: #e0e0e0;
            --error-color: #e63946;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: fadeIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            height: 70px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-color);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background-color: #f1f3f6;
            color: var(--dark-color);
        }

        .login-form input:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            outline: none;
            box-shadow: 0 5px 15px rgba(20, 89, 158, 0.1);
        }

        .login-form .input-icon {
            position: absolute;
            left: 17px;
            top: 40px;
            color: #999;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-form input:focus+.input-icon {
            color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(20, 89, 158, 0.2);
        }

        .btn-submit:hover {
            background-color: #0d4a85;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(20, 89, 158, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider span {
            padding: 0 15px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background-color: white;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .btn-google:hover {
            background-color: #f8f9fa;
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-google img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }

        .login-footer a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'photos/logo.png' %}" alt="DomShop Logo" class="brand-logo">
            <h1>Bon retour !</h1>
            <p>Heureux de vous revoir sur DomShop</p>
        </div>

        <form method="POST" action="" class="login-form">
            {% csrf_token %}
            {% if request.GET.next %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            {% endif %}

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <i class="fas fa-lock input-icon"></i>
            </div>

            <button type="submit" class="btn-submit">
                Se connecter
            </button>
        </form>

        <div class="divider">
            <span>Ou continuer avec</span>
        </div>

        <form method="post" action="{% provider_login_url 'google' %}" id="google-login-form">
            {% csrf_token %}
            <button type="submit" class="btn-google">
                <img src="{% static 'photos/Google-logo.png' %}" alt="Google">
                Google
            </button>
        </form>

        <div class="login-footer">
            <p>Pas encore de compte ? <a href="{% url 'shop:register' %}">Créer un compte</a></p>
        </div>
    </div>
</body>

</html>
